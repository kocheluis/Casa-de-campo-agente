# Despliegue de la infraestructura del proyecto (Fase 0).
# Un solo VPS aloja: Caddy (HTTPS) + PostgreSQL + Redis + NocoDB + n8n + Chatwoot.
#
# Antes de levantar: copia .env.deploy.example a .env y rellena los valores.
# Levantar:   docker compose up -d
# Ver logs:   docker compose logs -f
# Detener:    docker compose down   (los datos persisten en los volúmenes)
#
# NOTA: es una plantilla de arranque sólida; algunos detalles (versiones, primer
# arranque de Chatwoot) los verificamos juntos en vivo sobre el VPS.

services:
  # --- Reverse proxy con HTTPS automático (Let's Encrypt) ---------------------
  # Está en el profile "proxy": SOLO se levanta en el VPS con --profile proxy.
  # En local se omite (se accede por localhost:puerto, ver docker-compose.local.yml).
  caddy:
    image: caddy:2
    profiles: ["proxy"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nocodb
      - n8n
      - chatwoot-rails

  # --- Base de datos compartida (crea 3 BD: nocodb, n8n, chatwoot) ------------
  postgres:
    image: pgvector/pgvector:pg16   # incluye pgvector que Chatwoot puede usar
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis (lo necesita Chatwoot; también sirve a n8n) ----------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data

  # --- NocoDB (base de datos del negocio: CRM, reservas, inventario) ----------
  nocodb:
    image: nocodb/nocodb:latest
    restart: unless-stopped
    environment:
      NC_DB: "pg://postgres:5432?u=${POSTGRES_USER}&p=${POSTGRES_PASSWORD}&d=nocodb"
      NC_PUBLIC_URL: "https://db.${DOMAIN}"
      # Promueve a este usuario a super admin al arrancar (rol org-level-creator).
      NC_ADMIN_EMAIL: ${NC_ADMIN_EMAIL:-admin@casadecampo.local}
      NC_ADMIN_PASSWORD: ${NC_ADMIN_PASSWORD:-CasaDeCampo2026!}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - nocodb_data:/usr/app/data

  # --- n8n (orquestador 24/7) -------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: "n8n.${DOMAIN}"
      N8N_PROTOCOL: https
      WEBHOOK_URL: "https://n8n.${DOMAIN}/"
      GENERIC_TIMEZONE: America/Lima
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n

  # --- Chatwoot: servidor web (Rails) -----------------------------------------
  chatwoot-rails:
    image: chatwoot/chatwoot:latest
    restart: unless-stopped
    command: ["sh", "-c", "bundle exec rails db:chatwoot_prepare && bundle exec rails s -p 3000 -b 0.0.0.0"]
    environment: &chatwoot_env
      INSTALLATION_ENV: docker
      RAILS_ENV: production
      NODE_ENV: production
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
      FRONTEND_URL: "https://chat.${DOMAIN}"
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      RAILS_LOG_TO_STDOUT: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - chatwoot_storage:/app/storage

  # --- Chatwoot: worker de tareas en segundo plano (Sidekiq) ------------------
  chatwoot-sidekiq:
    image: chatwoot/chatwoot:latest
    restart: unless-stopped
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    environment: *chatwoot_env
    depends_on:
      - postgres
      - redis
      - chatwoot-rails
    volumes:
      - chatwoot_storage:/app/storage

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  nocodb_data:
  n8n_data:
  chatwoot_storage:
